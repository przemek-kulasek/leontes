services:
  db:
    image: postgres:17
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=${LEONTES_CONNECTION_STRING}
    depends_on:
      db:
        condition: service_healthy

# Leontes.Worker runs natively on Windows (needs OS APIs for Sentinel).
# Start it separately: dotnet run --project backend/src/Leontes.Worker

volumes:
  pgdata:
