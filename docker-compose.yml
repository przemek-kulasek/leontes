services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: leontes
      POSTGRES_PASSWORD: leontes
      POSTGRES_DB: leontes
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leontes"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=leontes;Username=leontes;Password=leontes
    depends_on:
      db:
        condition: service_healthy

# Leontes.Worker runs natively on Windows (needs OS APIs for Sentinel).
# Start it separately: dotnet run --project backend/src/Leontes.Worker

volumes:
  pgdata:
